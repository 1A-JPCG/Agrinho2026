<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Agroforte Sustentável</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="quiz-container">
        <header>
            <h1>🌱 Agroforte</h1>
            <p>Equilíbrio entre Produção e Meio Ambiente</p>
        </header>

        <div id="game-box" class="fade-in">
            <div id="status-panel">
                <div id="timer-display">⏱️ Tempo: 15s</div>
                <div id="streak-display">Combo: x1</div>
            </div>

            <div id="question-counter">Carregando...</div>
            <div id="question-text">A pergunta aparecerá aqui.</div>
            
            <div id="options-container"></div>
            
            <button id="next-btn" class="hide">Próxima Pergunta ➔</button>
        </div>

        <div id="result-box" class="hide">
            <h2>🏆 Fim do Quiz!</h2>
            <div id="score-text">Você acertou 0 de 0 perguntas!</div>
            <button id="restart-btn">Jogar Novamente ↻</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
