<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia Agroforte - Equilíbrio e Produção</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <header>
            <h1>Trivia Agroforte</h1>
            <p>O equilíbrio entre a produção agrícola e a conservação do meio ambiente</p>
        </header>

        <div id="game-box">
            <div id="question-counter">Pergunta 1 de 5</div>
            <div id="question-text">Carregando pergunta...</div>
            <div id="options-container">
                </div>
            <button id="next-btn" class="hide">Próxima Pergunta</button>
        </div>

        <div id="result-box" class="hide">
            <h2>Fim do Jogo!</h2>
            <p id="score-text"></p>
            <button id="restart-btn">Jogar Novamente</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
